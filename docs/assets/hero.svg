<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 36 1280 272" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" role="img" aria-label="PactFuse spend line: an unsafe source trips the on-chain procurement gate before payment — spend halted, 0 moved">
  <defs>
    <radialGradient id="gb" cx="10%" cy="-10%" r="55%"><stop offset="0%" stop-color="#d1b16e" stop-opacity="0.10"/><stop offset="100%" stop-color="#d1b16e" stop-opacity="0"/></radialGradient>
    <radialGradient id="gc" cx="92%" cy="-10%" r="52%"><stop offset="0%" stop-color="#6488f4" stop-opacity="0.10"/><stop offset="100%" stop-color="#6488f4" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#edf2f8" fill-opacity="0.05"/></pattern>
  </defs>
  <rect width="1280" height="340" fill="#080b10"/>
  <rect width="1280" height="340" fill="url(#grid)"/>
  <rect width="1280" height="340" fill="url(#gb)"/>
  <rect width="1280" height="340" fill="url(#gc)"/>

  <!-- conduits -->
  <path d="M224 200 H436" stroke="#dfa84d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M504 200 H690" stroke="#dfa84d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M760 126 V154" stroke="#dfa84d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M806 200 H1036" stroke="#f1605d" stroke-width="2.2" stroke-dasharray="6 7" stroke-opacity="0.5" fill="none"/>

  <!-- source registry -->
  <g transform="translate(760,92)">
    <rect x="-34" y="-34" width="68" height="68" rx="15" fill="#101722" stroke="#dfa84d" stroke-width="1.6"/>
    <ellipse cx="0" cy="-10" rx="14" ry="4.6" fill="none" stroke="#dfa84d" stroke-width="1.7"/>
    <path d="M-14 -10 V8 a14 4.6 0 0 0 28 0 V-10" fill="none" stroke="#dfa84d" stroke-width="1.7"/>
    <path d="M-14 -1 a14 4.6 0 0 0 28 0" fill="none" stroke="#dfa84d" stroke-width="1.7"/>
    <text x="0" y="-46" fill="#aab5c5" font-size="11.5" text-anchor="middle" letter-spacing="1.4">SOURCE REGISTRY</text>
  </g>
  <text x="808" y="96" fill="#8492a8" font-size="11.5">blocks 42758099, 42758112</text>

  <!-- agent wallet -->
  <g transform="translate(190,200)">
    <rect x="-34" y="-34" width="68" height="68" rx="15" fill="#101722" stroke="#dfa84d" stroke-width="1.6"/>
    <rect x="-15" y="-12" width="27" height="23" rx="4.5" fill="none" stroke="#dfa84d" stroke-width="1.7"/>
    <circle cx="9" cy="-0.5" r="3.2" fill="#dfa84d"/>
    <text x="0" y="56" fill="#aab5c5" font-size="12.5" text-anchor="middle" letter-spacing="1.3">AGENT WALLET</text>
    <text x="0" y="74" fill="#8492a8" font-size="11">cobo caw</text>
  </g>

  <!-- pact policy (shield) -->
  <g transform="translate(470,200)">
    <rect x="-34" y="-34" width="68" height="68" rx="15" fill="#101722" stroke="#dfa84d" stroke-width="1.6"/>
    <path d="M0 -16 C 8 -10 14 -10 16 -10 V2 C16 12 8 16 0 18 C-8 16 -16 12 -16 2 V-10 C-14 -10 -8 -10 0 -16 Z" fill="none" stroke="#dfa84d" stroke-width="1.7"/>
    <path d="M-6 0 l4 4 l8 -9" fill="none" stroke="#dfa84d" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="56" fill="#aab5c5" font-size="12.5" text-anchor="middle" letter-spacing="1.3">PACT POLICY</text>
    <text x="0" y="74" fill="#8492a8" font-size="11">allowlist · limits</text>
  </g>

  <!-- the spend, halted on the wire just before the open breaker -->
  <circle cx="690" cy="200" r="11" fill="none" stroke="#f1605d" stroke-width="1.6" stroke-opacity="0.55"/>
  <circle cx="690" cy="200" r="5.2" fill="#f1605d"/>

  <!-- procurement gate (breaker — tripped) -->
  <g transform="translate(760,200)">
    <rect x="-54" y="-54" width="108" height="108" rx="20" fill="none" stroke="#f1605d" stroke-width="1.4" stroke-opacity="0.55"/>
    <rect x="-46" y="-46" width="92" height="92" rx="16" fill="#100f12" stroke="#f1605d" stroke-width="1.7"/>
    <path d="M-46 0 H-22" stroke="#aab5c5" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M22 0 H46" stroke="#f1605d" stroke-width="2.4" stroke-linecap="round" stroke-opacity="0.4"/>
    <circle cx="-22" cy="0" r="4.6" fill="#aab5c5"/>
    <circle cx="22" cy="0" r="4.6" fill="#f1605d"/>
    <path d="M-22 0 L8 -22" stroke="#f1605d" stroke-width="2.9" stroke-linecap="round"/>
    <text x="0" y="74" fill="#aab5c5" font-size="12.5" text-anchor="middle" letter-spacing="1.3">PROCUREMENT GATE</text>
    <text x="0" y="92" fill="#2fd19d" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1.6">SPEND HALTED</text>
  </g>

  <!-- 0 moved + cut -->
  <text x="921" y="178" fill="#8492a8" font-size="11.5" text-anchor="middle">0 moved</text>
  <path d="M911 192 l20 20 M931 192 l-20 20" stroke="#f1605d" stroke-width="2.4" stroke-linecap="round"/>

  <!-- artifact market (unreached, dimmed) -->
  <g transform="translate(1070,200)" opacity="0.4">
    <rect x="-34" y="-34" width="68" height="68" rx="15" fill="#0d131c" stroke="#2a3648" stroke-width="1.5"/>
    <path d="M-13 -7 a2 2 0 0 1 1 -1.7 l11 -6.3 a2 2 0 0 1 2 0 l11 6.3 a2 2 0 0 1 1 1.7 v13 a2 2 0 0 1 -1 1.7 l-11 6.3 a2 2 0 0 1 -2 0 l-11 -6.3 a2 2 0 0 1 -1 -1.7 z" fill="none" stroke="#8492a8" stroke-width="1.6"/>
    <path d="M-12.6 -6 L0 1 L12.6 -6 M0 1 V15" fill="none" stroke="#8492a8" stroke-width="1.6"/>
    <text x="0" y="56" fill="#8492a8" font-size="12.5" text-anchor="middle" letter-spacing="1.3">ARTIFACT MARKET</text>
    <text x="0" y="74" fill="#627087" font-size="11">paid delivery</text>
  </g>
</svg>
