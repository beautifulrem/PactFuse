<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" role="img" aria-label="PactFuse">
  <defs>
    <radialGradient id="ogA" cx="8%" cy="-8%" r="60%"><stop offset="0" stop-color="#d1b16e" stop-opacity=".14"/><stop offset="100%" stop-color="#d1b16e" stop-opacity="0"/></radialGradient>
    <radialGradient id="ogB" cx="96%" cy="-6%" r="58%"><stop offset="0" stop-color="#6488f4" stop-opacity=".13"/><stop offset="100%" stop-color="#6488f4" stop-opacity="0"/></radialGradient>
    <radialGradient id="ogC" cx="78%" cy="118%" r="55%"><stop offset="0" stop-color="#f1605d" stop-opacity=".08"/><stop offset="100%" stop-color="#f1605d" stop-opacity="0"/></radialGradient>
    <pattern id="ogGrid" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="1.4" cy="1.4" r="1.4" fill="#edf2f8" fill-opacity=".05"/></pattern>
    <clipPath id="round"><rect x="92" y="171" width="288" height="288" rx="56"/></clipPath>
  </defs>
  <rect width="1200" height="630" fill="#07090d"/>
  <rect width="1200" height="630" fill="url(#ogGrid)"/>
  <rect width="1200" height="630" fill="url(#ogA)"/>
  <rect width="1200" height="630" fill="url(#ogB)"/>
  <rect width="1200" height="630" fill="url(#ogC)"/>

  <!-- the brand mark (the chosen logo) as a rounded tile -->
  <rect x="92" y="171" width="288" height="288" rx="56" fill="none" stroke="#2c3a4e" stroke-width="2"/>
  <image xlink:href="icon-512.png" href="icon-512.png" x="92" y="171" width="288" height="288" clip-path="url(#round)"/>

  <g font-family="'Helvetica Neue',Arial,'PingFang SC','Hiragino Sans GB',sans-serif">
    <text x="430" y="232" fill="#d1b16e" font-size="22" font-weight="700" letter-spacing="5">COBO AGENTIC WALLET TRACK</text>
    <text x="426" y="338" fill="#edf2f8" font-size="104" font-weight="800" letter-spacing="1">PACTFUSE</text>
    <text x="430" y="400" fill="#aab5c5" font-size="33" font-weight="500">On-chain circuit breaker for agent payments</text>
    <text x="430" y="448" fill="#8492a8" font-size="27" font-weight="500">面向 Agent 支付的链上断路器,付款前熔断不安全来源</text>
    <text x="430" y="556" fill="#627087" font-size="22" font-weight="500" font-family="ui-monospace,Menlo,monospace">Base Sepolia · evidence-backed · keyless live verify</text>
  </g>
</svg>
