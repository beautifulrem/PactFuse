<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="PactFuse">
  <defs>
    <radialGradient id="bg" cx="32%" cy="20%" r="95%">
      <stop offset="0" stop-color="#1b2433"/><stop offset="55%" stop-color="#0d1118"/><stop offset="100%" stop-color="#080b10"/>
    </radialGradient>
    <radialGradient id="glow" cx="48%" cy="44%" r="56%">
      <stop offset="0" stop-color="#d1b16e" stop-opacity=".18"/><stop offset="100%" stop-color="#d1b16e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arm" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c69a4f"/><stop offset="1" stop-color="#ecd49a"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="244" height="244" rx="58" fill="url(#bg)" stroke="#2c3a4e" stroke-width="2.5"/>
  <rect x="6" y="6" width="244" height="244" rx="58" fill="url(#glow)"/>
  <!-- conduits: live (brass-grey) left, severed (red, dimmed) right -->
  <path d="M40 142 H86" stroke="#9aa7bb" stroke-width="15" stroke-linecap="round"/>
  <path d="M170 142 H216" stroke="#f1605d" stroke-width="15" stroke-linecap="round" stroke-opacity=".42"/>
  <!-- contacts -->
  <circle cx="86" cy="142" r="13.5" fill="#ecd49a"/>
  <circle cx="170" cy="142" r="13.5" fill="#f1605d"/>
  <!-- the breaker arm, hinged at the live contact and tripped open (swung up) -->
  <path d="M86 142 L158 90" stroke="url(#arm)" stroke-width="22" stroke-linecap="round"/>
  <!-- spark at the break -->
  <g stroke="#ff8472" stroke-width="7.5" stroke-linecap="round">
    <path d="M158 90 l17 -13"/><path d="M158 90 l22 7"/><path d="M158 90 l-3 -23"/>
  </g>
</svg>
