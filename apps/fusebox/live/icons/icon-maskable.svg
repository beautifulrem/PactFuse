<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="PactFuse">
  <defs>
    <radialGradient id="bgm" cx="38%" cy="26%" r="100%">
      <stop offset="0" stop-color="#1b2433"/><stop offset="55%" stop-color="#0d1118"/><stop offset="100%" stop-color="#080b10"/>
    </radialGradient>
    <linearGradient id="armm" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c69a4f"/><stop offset="1" stop-color="#ecd49a"/>
