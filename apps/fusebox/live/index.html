<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>PactFuse Console — evidence-backed agent procurement demo</title>
<meta name="description" content="Interactive demo of PactFuse: an on-chain procurement gate that watches source freshness and interrupts agent spending before payment. Every scenario replays verified Base Sepolia + Cobo Agentic Wallet evidence." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles/tokens.css" />
<link rel="stylesheet" href="./styles/app.css" />
</head>
<body data-motion="full">

<div id="appLoading" class="app-loading" role="status">
  <i class="spinner" aria-hidden="true"></i>
  <p data-i18n="loading">loading signed proof artifacts…</p>
</div>

<header id="appHeader" class="shell app-header" role="banner"></header>

<div id="metricStrip" class="shell metric-strip" role="group" aria-label="Session metrics"></div>

<main class="shell console" role="main">
  <aside id="scenarioPanel" class="console-aside" aria-label="Scenario controls"></aside>
  <section class="console-stage" aria-label="Live system state">
    <div id="stageRail" class="stage-head"></div>
    <div id="flowMap" class="flowmap"></div>
    <div class="insight-row">
      <section id="inspectorPanel" class="inspector" aria-label="Event inspector"></section>
      <section id="logPanel" class="logpanel" aria-label="Evidence log"></section>
    </div>
  </section>
</main>

<footer id="appFooter" class="shell provenance mono" role="contentinfo"></footer>

<div id="drawerRoot"></div>
<div id="toast" class="toast mono" role="status" aria-live="polite" hidden></div>

<button id="helpHint" class="help-hint mono" type="button" aria-label="Keyboard shortcuts — press ?" data-i18n="help.hint">? shortcuts</button>
<div id="shortcutHelp" class="help-overlay" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts" hidden>
  <div class="help-card">
    <h3 class="help-title" data-i18n="help.title">Keyboard shortcuts</h3>
    <dl class="help-list mono">
      <div><dt>1 · 2 · 3</dt><dd data-i18n="help.r1">Select risk scenario</dd></div>
      <div><dt>R</dt><dd data-i18n="help.r2">Run / retry the scenario</dd></div>
      <div><dt>C</dt><dd data-i18n="help.r3">Clear evidence log</dd></div>
      <div><dt>0</dt><dd data-i18n="help.r4">Reset to idle</dd></div>
      <div><dt>J · H · T</dt><dd data-i18n="help.r5">Judge check · Proof hashes · Self-test</dd></div>
      <div><dt>?</dt><dd data-i18n="help.r6">Toggle this help</dd></div>
      <div><dt>Esc</dt><dd data-i18n="help.r7">Close</dd></div>
    </dl>
    <button class="btn btn-ghost" id="helpClose" type="button" data-i18n="help.close">close</button>
  </div>
</div>

<script type="module" src="./src/main.mjs"></script>
</body>
</html>
